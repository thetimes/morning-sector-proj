<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>leader-pulse-kr-full</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f7f6f2; --surface:#fbfaf7; --surface-2:#f2efea; --text:#24211b; --muted:#66635e; --border:rgba(36,33,27,.12);
      --primary:#0c676d; --primary-soft:#d7e5e4; --danger:#bc3f36; --radius:20px; --font-display:'General Sans','Inter',sans-serif; --font-body:'Satoshi','Inter',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh}
    .app{width:min(100%,460px);margin:0 auto;padding:20px 16px 110px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .logo{display:flex;gap:12px;align-items:center}.mark{width:40px;height:40px;border-radius:14px;background:var(--primary-soft);display:grid;place-items:center;color:var(--primary)}
    h1{font-family:var(--font-display);font-size:1.3rem;letter-spacing:-.03em}.muted{color:var(--muted)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
    .hero h2{font-family:var(--font-display);font-size:1.7rem;line-height:1.06;letter-spacing:-.04em;max-width:12ch;margin:10px 0}
    .pill{display:inline-flex;padding:6px 10px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-size:.78rem;font-weight:700}
    .status{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.status .mini{background:var(--surface-2);border-radius:14px;padding:10px;border:1px solid var(--border)}
    .mini span{font-size:.75rem;color:var(--muted);display:block}.mini strong{font-size:.92rem}
    .row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}.list{display:grid;gap:10px}
    .item{background:var(--surface-2);border:1px solid var(--border);border-radius:16px;padding:14px}.item-head{display:flex;justify-content:space-between;gap:8px}.item strong{display:block}.small{font-size:.78rem;color:var(--muted)}
    .up{color:var(--danger)} .score{font-weight:800;font-size:1.1rem}.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.tag{font-size:.75rem;padding:5px 9px;border-radius:999px;background:#fff;border:1px solid var(--border);color:var(--muted)}
    .tag.primary{background:var(--primary-soft);border-color:transparent;color:var(--primary)}
    .footer{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(100%,460px);padding:12px 16px 24px;background:rgba(247,246,242,.92);backdrop-filter:blur(12px);border-top:1px solid var(--border)}
    .footer code{font-size:.78rem;display:block;word-break:break-all;color:var(--muted)}
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="logo">
        <div class="mark">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 16.5L9 11l3.2 3.2L20 6"/><path d="M15 6h5v5"/></svg>
        </div>
        <div>
          <h1>Leader Pulse KR</h1>
          <div class="small">FastAPI + WebSocket 실시간 버전</div>
        </div>
      </div>
      <div class="pill" id="providerBadge">provider</div>
    </header>

    <section class="card hero">
      <div class="pill">오전장 실시간 주도 섹터</div>
      <h2>브로커 시세를 받아 섹터와 대표 종목을 계속 갱신합니다</h2>
      <p class="muted">현재 화면은 백엔드 WebSocket에서 스냅샷을 받아 자동으로 갱신됩니다.</p>
      <div class="status">
        <div class="mini"><span>상태</span><strong id="healthStatus">연결 대기</strong></div>
        <div class="mini"><span>공급자</span><strong id="providerName">-</strong></div>
        <div class="mini"><span>업데이트</span><strong id="lastUpdate">-</strong></div>
      </div>
    </section>

    <section class="card">
      <div class="row"><h2 style="font-size:1.05rem">주도 섹터</h2><span class="small">실시간 랭킹</span></div>
      <div id="sectorList" class="list"></div>
    </section>

    <section class="card">
      <div class="row"><h2 style="font-size:1.05rem">주요 종목</h2><span class="small" id="selectedSectorLabel">섹터 선택 대기</span></div>
      <div id="stockList" class="list"></div>
    </section>
  </main>

  <div class="footer">
    <div class="small">WebSocket endpoint</div>
    <code id="wsUrl"></code>
  </div>

  <script>
    const providerBadge = document.getElementById('providerBadge');
    const providerName = document.getElementById('providerName');
    const healthStatus = document.getElementById('healthStatus');
    const lastUpdate = document.getElementById('lastUpdate');
    const sectorList = document.getElementById('sectorList');
    const stockList = document.getElementById('stockList');
    const selectedSectorLabel = document.getElementById('selectedSectorLabel');
    const wsUrlEl = document.getElementById('wsUrl');

    let latestSectors = [];
    let selectedSector = null;

    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    const wsUrl = `${wsProto}://${location.host}/ws/market`;
    wsUrlEl.textContent = wsUrl;

    function render() {
      sectorList.innerHTML = latestSectors.map((sector, idx) => `
        <button class="item" data-sector="${sector.sector}" style="text-align:left;cursor:pointer;${selectedSector === sector.sector || (!selectedSector && idx===0) ? 'outline:2px solid var(--primary)' : ''}">
          <div class="item-head">
            <div>
              <strong>${idx + 1}. ${sector.sector}</strong>
              <div class="small">거래대금 ${Math.round(sector.turnover_million_krw).toLocaleString()}백만원 · 확산 ${sector.breadth}</div>
            </div>
            <div style="text-align:right">
              <div class="score">${sector.score}</div>
              <div class="small up">${sector.change_pct > 0 ? '+' : ''}${sector.change_pct}%</div>
            </div>
          </div>
          <div class="tags">
            <span class="tag primary">${sector.confidence}</span>
            <span class="tag">${sector.rationale}</span>
          </div>
        </button>
      `).join('');

      if (!selectedSector && latestSectors.length) selectedSector = latestSectors[0].sector;
      const current = latestSectors.find(s => s.sector === selectedSector) || latestSectors[0];
      selectedSectorLabel.textContent = current ? current.sector : '데이터 없음';
      stockList.innerHTML = current ? current.leaders.map(stock => `
        <article class="item">
          <div class="item-head">
            <div>
              <strong>${stock.name}</strong>
              <div class="small">${stock.code}</div>
            </div>
            <div style="text-align:right">
              <strong>${Number(stock.price).toLocaleString()}원</strong>
              <div class="small up">${stock.change_pct > 0 ? '+' : ''}${stock.change_pct}%</div>
            </div>
          </div>
          <div class="tags">
            <span class="tag primary">자금 ${stock.flow_score}</span>
            <span class="tag">호가 ${stock.spread_score}</span>
            ${stock.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
          </div>
        </article>
      `).join('') : '<div class="small muted">아직 데이터가 없습니다.</div>';

      [...document.querySelectorAll('[data-sector]')].forEach(btn => {
        btn.onclick = () => { selectedSector = btn.dataset.sector; render(); };
      });
    }

    async function bootstrap() {
      try {
        const cfg = await fetch('/api/config').then(r => r.json());
        providerBadge.textContent = cfg.provider;
        providerName.textContent = cfg.provider;
      } catch (_) {}

      const socket = new WebSocket(wsUrl);
      socket.onopen = () => { healthStatus.textContent = '연결됨'; };
      socket.onclose = () => { healthStatus.textContent = '연결 종료'; };
      socket.onerror = () => { healthStatus.textContent = '오류'; };
      socket.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        latestSectors = payload.data || [];
        providerBadge.textContent = payload.provider;
        providerName.textContent = payload.provider;
        lastUpdate.textContent = new Date().toLocaleTimeString('ko-KR');
        render();
      };
    }

    bootstrap();
  </script>
</body>
</html>
